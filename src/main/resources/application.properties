spring.application.name=website.demo

# JSP configuration (matches src/main/webapp/index.jsp)
spring.mvc.view.prefix=/
spring.mvc.view.suffix=.jsp

# Disable Thymeleaf (since you're using JSP)
spring.thymeleaf.enabled=false

# Render provides PORT at runtime. Locally this still uses 8080.
server.port=${PORT:8080}

# URL for the prediction API. Set this on Render if the Flask app is deployed separately.
prediction.api.url=${PREDICT_API_URL:http://localhost:5000/predict}
