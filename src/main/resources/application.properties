spring.application.name=website.demo

# JSP configuration (matches src/main/webapp/index.jsp)
spring.mvc.view.prefix=/
spring.mvc.view.suffix=.jsp

# Disable Thymeleaf (since you're using JSP)
spring.thymeleaf.enabled=false

# Render provides PORT at runtime. Locally this still uses 8080.
server.port=${PORT:8080}

# URL for the prediction API. Locally this defaults to the Flask server on port 5000.
prediction.api.url=${PREDICT_API_URL:https://website-demo-api.onrender.com/predict}
prediction.api.host=${PREDICT_API_HOST:localhost}
prediction.api.port=${PREDICT_API_PORT:5000}
prediction.api.path=${PREDICT_API_PATH:/predict}
